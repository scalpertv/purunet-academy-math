name: Deploy ivy-self-directed-learning-coach to Cloudflare Pages
on:
  push:
    branches: [ main ]
    paths:
      - 'ivy-self-directed-learning-coach/**'
  workflow_dispatch: {}
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy ivy-self-directed-learning-coach --project-name=ivy-self-directed-learning-coach --commit-dirty=true
